<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b13" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>
    
    <!-- Gradient for Main Shield/Document Outline -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Gradient for Swoosh / Flow -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Drop Shadow filter for glow effects -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#8b5cf6" flood-opacity="0.4" />
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Base dark rounded container -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="12" y="12" width="488" height="488" rx="100" stroke="url(#primary-grad)" stroke-width="6" stroke-opacity="0.3" />

  <!-- Logo Graphics Group with neon glow -->
  <g filter="url(#neon-glow)">
    <!-- Document Checklist Body -->
    <rect x="156" y="112" width="200" height="260" rx="28" fill="#0d1527" stroke="url(#primary-grad)" stroke-width="16" stroke-linejoin="round" />
    
    <!-- Checklist items (Lines) -->
    <line x1="200" y1="180" x2="312" y2="180" stroke="#475569" stroke-width="12" stroke-linecap="round" />
    <line x1="200" y1="236" x2="312" y2="236" stroke="#475569" stroke-width="12" stroke-linecap="round" />
    <line x1="200" y1="292" x2="260" y2="292" stroke="#475569" stroke-width="12" stroke-linecap="round" />
    
    <!-- Audit pass checkmark in bottom right -->
    <circle cx="340" cy="320" r="56" fill="#070b13" stroke="url(#flow-grad)" stroke-width="12" />
    <path d="M308 318L330 340L372 298" stroke="#10b981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Swoosh flow running through the document symbolizing "Flow" -->
    <path d="M100 240C100 240 180 120 300 130C420 140 430 260 320 380C260 440 180 440 130 400" stroke="url(#flow-grad)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9" />
  </g>
</svg>